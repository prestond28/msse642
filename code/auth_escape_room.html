<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authentication Failures: Escape Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface-secondary: #f1f0ed;
    --border: #e4e2dd;
    --border-strong: #ccc9c2;
    --text: #1a1916;
    --text-secondary: #6b6860;
    --text-tertiary: #9c9a94;
    --blue: #185FA5;
    --blue-bg: #e8f1fb;
    --blue-text: #0c447c;
    --green: #1D9E75;
    --green-bg: #e1f5ee;
    --green-text: #085041;
    --green-border: #5dcaa5;
    --red: #E24B4A;
    --red-bg: #fcebeb;
    --red-text: #791f1f;
    --red-border: #f09595;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    line-height: 1.55;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 18px;
    border-bottom: 0.5px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .game-title { font-size: 13px; font-weight: 600; letter-spacing: -0.2px; margin-right: auto; }
  .stat { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
  .stat-val { font-weight: 600; color: var(--text); font-size: 12px; }
  .sep { color: var(--border-strong); }

  .progress-row { display: flex; gap: 4px; width: 70px; }
  .pdot { height: 4px; border-radius: 2px; flex: 1; background: var(--border); transition: background 0.3s; }
  .pdot.done { background: var(--green); }
  .pdot.active { background: var(--blue); }

  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
    overflow: hidden;
  }

  .left-panel {
    display: flex;
    flex-direction: column;
    padding: 18px 20px;
    border-right: 0.5px solid var(--border);
    overflow: hidden;
  }

  .right-panel {
    display: flex;
    flex-direction: column;
    padding: 18px 20px;
    overflow: hidden;
  }

  .room-tag { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 9px; border-radius: 99px; margin-bottom: 8px; letter-spacing: 0.2px; flex-shrink: 0; }
  .room-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 8px; letter-spacing: -0.2px; flex-shrink: 0; line-height: 1.3; }
  .room-body { font-size: 12.5px; color: var(--text-secondary); line-height: 1.65; flex-shrink: 0; }
  .room-body strong { color: var(--text); font-weight: 500; }

  .terminal {
    background: #1a1916; color: #9fe1cb; border-radius: var(--radius-md);
    padding: 10px 12px; margin-top: 10px;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 11px; line-height: 1.6; white-space: pre-wrap; flex-shrink: 0;
  }

  .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; flex-shrink: 0; }
  .profile-item { background: var(--surface-secondary); border-radius: var(--radius-md); padding: 6px 8px; font-size: 11.5px; }
  .profile-item .lbl { color: var(--text-tertiary); font-size: 9px; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }

  .clue-box {
    background: var(--surface-secondary); border-radius: var(--radius-md);
    padding: 9px 11px; margin-top: 12px; font-size: 12px; line-height: 1.6; color: var(--text); flex-shrink: 0;
  }
  .clue-label { font-size: 9px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }

  .answer-slot {
    display: flex; gap: 6px; min-height: 38px;
    border: 1.5px dashed var(--border-strong); border-radius: var(--radius-md);
    padding: 6px; margin-bottom: 10px; align-items: center; flex-wrap: wrap;
    background: var(--surface-secondary); flex-shrink: 0;
  }
  .answer-slot.filled { border-style: solid; border-color: var(--border); }
  .placed-block {
    font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
    background: var(--surface); border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-md); padding: 5px 10px; cursor: pointer; color: var(--text);
  }
  .placed-block:hover { background: var(--surface-secondary); }
  .slot-placeholder { font-size: 11.5px; color: var(--text-tertiary); padding: 4px; }

  .block-bank { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; flex-shrink: 0; }
  .block {
    font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
    background: var(--surface); border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-md); padding: 6px 11px; cursor: pointer; color: var(--text);
    transition: background 0.12s, border-color 0.12s;
  }
  .block:hover { background: var(--surface-secondary); border-color: var(--blue); }
  .block:disabled { opacity: 0.3; cursor: not-allowed; background: var(--surface-secondary); }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
  button.action {
    font-size: 12px; font-family: 'Inter', sans-serif; font-weight: 500;
    padding: 7px 14px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border-strong); background: var(--surface);
    color: var(--text); cursor: pointer; transition: background 0.15s;
  }
  button.action:hover { background: var(--surface-secondary); }
  button.action.primary { background: var(--blue); color: #fff; border: none; }
  button.action.primary:hover { background: var(--blue-text); }
  button.action:disabled { opacity: 0.4; cursor: not-allowed; }

  .hint-text { font-size: 12px; color: var(--text-secondary); font-style: italic; margin-top: 6px; flex-shrink: 0; }

  .feedback-area { margin-top: 10px; flex: 1; display: flex; flex-direction: column; gap: 6px; overflow: hidden; }
  .feedback { border-radius: var(--radius-md); padding: 8px 10px; font-size: 11.5px; line-height: 1.55; flex-shrink: 0; }
  .feedback.good { background: var(--green-bg); color: var(--green-text); border: 0.5px solid var(--green-border); }
  .feedback.bad { background: var(--red-bg); color: var(--red-text); border: 0.5px solid var(--red-border); }
  .feedback strong { font-weight: 500; }

  .key-lesson {
    padding: 8px 10px; font-size: 11.5px; color: var(--blue-text);
    border-left: 3px solid var(--blue); background: var(--blue-bg);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0; line-height: 1.55; flex-shrink: 0;
  }
  .key-lesson strong { font-weight: 500; }

  .next-btn-wrap { margin-top: auto; flex-shrink: 0; }

  .end-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 1.5rem; flex: 1; overflow: hidden;
  }
  .end-icon { font-size: 40px; margin-bottom: 10px; }
  .end-title { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 5px; }
  .end-score { font-size: 26px; font-weight: 600; color: var(--blue); margin-bottom: 3px; }
  .end-label { font-size: 11px; color: var(--text-tertiary); margin-bottom: 12px; }
  .end-body { font-size: 12px; color: var(--text-secondary); line-height: 1.6; max-width: 360px; margin-bottom: 12px; }
  .end-lesson {
    background: var(--blue-bg); border-left: 3px solid var(--blue);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 9px 12px;
    font-size: 11.5px; color: var(--blue-text); text-align: left; max-width: 400px; margin-bottom: 16px; line-height: 1.55;
  }
  .end-lesson strong { font-weight: 500; }
</style>
</head>
<body>

<div class="topbar">
  <span class="game-title">Authentication failures: the escape room</span>
  <span class="stat">Room <span class="stat-val" id="hud-room">1/3</span></span>
  <span class="sep">·</span>
  <span class="stat">Score <span class="stat-val" id="hud-score">0</span></span>
  <span class="sep">·</span>
  <span class="stat">Hints <span class="stat-val" id="hud-hints">3</span></span>
  <span class="sep">·</span>
  <div class="progress-row" id="hud-dots"></div>
</div>

<div class="main" id="main-layout">
  <div class="left-panel" id="left-panel"></div>
  <div class="right-panel" id="right-panel"></div>
</div>

<script>
const ROOMS = [
  {
    id:1,
    tag:"Room 1 of 3", tagBg:"#e8f1fb", tagColor:"#0c447c",
    title:"The locked terminal",
    body:"You're a security auditor locked inside NorthPeak Bank's old testing server room. The exit door runs on the same login system as the bank's customer portal. To get out, log in as test account <strong>'bsmith'</strong>. You find an employee profile pinned to the corkboard.",
    profile:{
      name:"Brenda Smith", role:"Branch Manager", pet:"Dog: Biscuit",
      born:"03/14/1979", team:"Go Hawks!!", hobby:"Loves gardening"
    },
    clueLabel:"Password policy sign on the wall",
    clue:"Min 8 characters, needs a capital letter and a number. Brenda always builds passwords from her pet's name plus her birth year. Tap 2 blocks.",
    blocks:["Biscuit","1979","Hawks","Garden","Brenda","2024","qwerty","Smith"],
    answerSlots:2,
    correctAnswers:[["Biscuit","1979"]],
    success:"Door unlocks! <strong>Biscuit1979</strong> was all it took. This is exactly how real attackers crack weak passwords: combining publicly available facts (pet names, birthdays) with whatever minimum complexity is required.",
    lesson:"Password policies that only check length and character types (not randomness or breach history) leave room for guessable, personally-identifiable passwords. Real defenses include passphrase encouragement and breach screening.",
    hint:"Combine the dog's name (Biscuit) with the birth year (1979) — in that order",
    points:100
  },
  {
    id:2,
    tag:"Room 2 of 3", tagBg:"#fdf0d8", tagColor:"#633806",
    title:"The session token vault",
    body:"You're through the door, but stuck in a server room with a vault that unlocks based on a 'valid session'. You peek at the logs and see session tokens being issued. They look suspiciously patterned.",
    sessionLog:[
      {time:"14:02:01", user:"guest01", token:"SESS-10042001"},
      {time:"14:02:47", user:"guest02", token:"SESS-10042002"},
      {time:"14:03:19", user:"guest03", token:"SESS-10042003"},
      {time:"14:03:55", user:"guest04", token:"SESS-10042004"},
    ],
    clueLabel:"Vault scanner",
    clue:"The vault accepts any currently-valid session token. Build the next likely token from the pattern in the logs. Tap 2 blocks.",
    blocks:["SESS-","10042005","10042099","99999999","SESS","10041999"],
    answerSlots:2,
    correctAnswers:[["SESS-","10042005"]],
    success:"Vault opens! The tokens were just an incrementing counter, so SESS-10042005 was a trivial guess. This is predictable/sequential session tokens: an attacker can hijack a session without ever knowing a password.",
    lesson:"Session tokens must be long, random, and unpredictable (cryptographically secure). Sequential or pattern-based tokens let attackers walk through valid sessions.",
    hint:"Look at the last digits across all 4 tokens — they're counting up by 1 each time",
    points:100
  },
  {
    id:3,
    tag:"Room 3 of 3", tagBg:"#fcebeb", tagColor:"#791f1f",
    title:"The MFA bypass",
    body:"Last obstacle: a checkpoint asks for a code sent to 'your' phone for two-factor auth. This old test system never limits how many codes you can try, and the meaningful part of the code is much shorter than it claims.",
    mfaInfo:"System: \"Enter the 6-digit code. (Always zero-padded: 00____.)\"\n\nNo attempt limit. No lockout after failed tries.\n\nSticky note: \"Test room number is 42. Code scheme appends the room number twice...\"",
    clueLabel:"Security note left by a previous tester",
    clue:"Two flaws: codes are short/predictable, AND there's no rate limiting. Build the 3-block code: zero-padding, then the room number twice.",
    blocks:["00","42","17","99","42","00"],
    answerSlots:3,
    correctAnswers:[["00","42","42"]],
    success:"Checkpoint cleared! With no rate limiting, you could try codes until one worked. Combined with a short, guessable code space, this is a textbook authentication failure.",
    lesson:"MFA is only as strong as its implementation: enough entropy (6+ random digits), short expiration windows, and strict rate-limiting/lockouts after failed attempts.",
    hint:"Codes always start with 00, then the room number (42) appears twice: 00, 42, 42",
    points:100
  }
];

let state = {room:0, score:0, hints:3, showHint:false, placed:[], result:null, showLesson:false, done:false, attempts:0};

function arraysEqual(a,b){
  if(a.length!==b.length) return false;
  for(let i=0;i<a.length;i++){ if(a[i]!==b[i]) return false; }
  return true;
}

function checkAnswer(room, placed){
  return room.correctAnswers.some(ans => arraysEqual(ans, placed));
}

function updateHud(){
  document.getElementById('hud-room').textContent = (state.room+1) + '/' + ROOMS.length;
  document.getElementById('hud-score').textContent = state.score;
  document.getElementById('hud-hints').textContent = state.hints;
  document.getElementById('hud-dots').innerHTML = ROOMS.map((_,i) =>
    `<div class="pdot ${i < state.room ? 'done' : i === state.room ? 'active' : ''}"></div>`
  ).join('');
}

function render(){
  updateHud();
  const main = document.getElementById('main-layout');

  if(state.done){
    const pct = Math.round(state.score/300*100);
    main.innerHTML = `<div class="end-screen" style="grid-column:1/-1">
      <div class="end-icon">${pct>=80?'🔓':'🗝️'}</div>
      <div class="end-title">You escaped!</div>
      <div class="end-score">${state.score}<span style="font-size:14px;color:#9c9a94">/300</span></div>
      <div class="end-label">${pct}% (fewer hints = higher score)</div>
      <div class="end-body">You broke out using three real authentication failure patterns: guessable passwords built from public info, predictable session tokens, and weak/un-throttled MFA.</div>
      <div class="end-lesson"><strong>The common thread:</strong> Authentication is only as strong as its weakest link — password policy, session generation, and MFA all need real randomness and rate-limiting to hold up.</div>
      <button class="action" onclick="resetGame()">↺ Play again</button>
    </div>`;
    return;
  }

  main.innerHTML = '<div class="left-panel" id="left-panel"></div><div class="right-panel" id="right-panel"></div>';

  const r = ROOMS[state.room];
  let bodyExtra = '';
  if(r.profile){
    bodyExtra = `<div class="profile-grid">
      ${Object.entries(r.profile).map(([k,v])=>`<div class="profile-item"><div class="lbl">${k}</div>${v}</div>`).join('')}
    </div>`;
  }
  if(r.sessionLog){
    bodyExtra = `<div class="terminal">${r.sessionLog.map(s=>`[${s.time}] user=${s.user}  token=${s.token}`).join('\n')}</div>`;
  }
  if(r.mfaInfo){
    bodyExtra = `<div class="terminal">${r.mfaInfo}</div>`;
  }

  document.getElementById('left-panel').innerHTML = `
    <span class="room-tag" style="background:${r.tagBg};color:${r.tagColor}">${r.tag}</span>
    <div class="room-title">${r.title}</div>
    <div class="room-body">${r.body}</div>
    ${bodyExtra}
    <div class="clue-box">
      <div class="clue-label">${r.clueLabel}</div>
      ${r.clue}
    </div>
  `;

  const slotsHtml = `<div class="answer-slot ${state.placed.length?'filled':''}">
    ${state.placed.length ? state.placed.map((p,i)=>`<button class="placed-block" onclick="removeBlock(${i})">${p} ✕</button>`).join('') : `<span class="slot-placeholder">Tap blocks below (${r.answerSlots} pieces needed)...</span>`}
  </div>`;

  const blockBank = `<div class="block-bank">
    ${r.blocks.map((b)=>{
      const disabled = state.placed.length>=r.answerSlots || state.result==='success';
      return `<button class="block" onclick="addBlock('${b.replace(/'/g,"\\'")}')" ${disabled?'disabled':''}>${b}</button>`;
    }).join('')}
  </div>`;

  const answered = state.result !== null;
  const feedbackHtml = answered ? `
    <div class="feedback-area">
      <div class="feedback ${state.result==='success'?'good':'bad'}">${state.result==='success' ? r.success : "Not quite — that combination didn't work. Clear it and try again."}</div>
      ${state.result==='success' && !state.showLesson ? `<button class="action" onclick="toggleLesson()">Explain the vulnerability</button>` : ''}
      ${state.showLesson ? `<div class="key-lesson"><strong>Remember:</strong> ${r.lesson}</div>` : ''}
      <div class="next-btn-wrap">
        ${state.result==='success'
          ? (state.room<ROOMS.length-1 ? `<button class="action primary" onclick="nextRoom()">Next room →</button>` : `<button class="action primary" onclick="finishGame()">Escape! →</button>`)
          : `<button class="action" onclick="clearBlocks()">Clear and retry</button>`}
      </div>
    </div>
  ` : '';

  document.getElementById('right-panel').innerHTML = `
    ${slotsHtml}
    ${blockBank}
    <div class="btn-row">
      <button class="action primary" onclick="attempt()" ${state.placed.length<r.answerSlots||state.result==='success'?'disabled':''}>Try this combination</button>
      <button class="action" onclick="showHint()" ${state.hints===0||state.showHint?'disabled':''}>Use hint</button>
    </div>
    ${state.showHint?`<p class="hint-text">Hint: ${r.hint}</p>`:''}
    ${feedbackHtml}
  `;
}

function addBlock(b){
  const r = ROOMS[state.room];
  if(state.placed.length>=r.answerSlots || state.result==='success') return;
  state.placed.push(b);
  render();
}

function removeBlock(i){
  if(state.result==='success') return;
  state.placed.splice(i,1);
  render();
}

function clearBlocks(){
  state.placed = [];
  state.result = null;
  render();
}

function attempt(){
  const r = ROOMS[state.room];
  if(checkAnswer(r, state.placed)){
    state.result = 'success';
    state.showLesson = false;
    const hintPenalty = state.showHint ? 50 : 0;
    state.score += Math.max(100 - hintPenalty - (state.attempts*10), 30);
  } else {
    state.result = 'fail';
    state.attempts++;
  }
  render();
}

function showHint(){
  if(state.hints>0 && !state.showHint){
    state.hints--;
    state.showHint = true;
    render();
  }
}

function toggleLesson(){
  state.showLesson = true;
  render();
}

function nextRoom(){
  state.room++;
  state.placed = [];
  state.result = null;
  state.showHint = false;
  state.showLesson = false;
  state.attempts = 0;
  render();
}

function finishGame(){
  state.done = true;
  render();
}

function resetGame(){
  state = {room:0, score:0, hints:3, showHint:false, placed:[], result:null, showLesson:false, done:false, attempts:0};
  render();
}

render();
</script>
</body>
</html>
