{% extends 'base.html' %}
{% block title %}Edit Profile — Summit Hiking Club{% endblock %}

{% block content %}
<h1>Edit Profile</h1>
<div class="card" style="max-width:500px">
    <form method="post">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" value="{{ user.name or '' }}">

        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ user.email }}" required>

        <label for="emergency_contact">Emergency Contact</label>
        <input type="text" id="emergency_contact" name="emergency_contact"
               value="{{ user.emergency_contact or '' }}"
               placeholder="Name and phone number">

        <div class="form-actions">
            <button class="btn btn-primary" type="submit">Save Changes</button>
            <a class="btn btn-secondary" href="{{ url_for('profile') }}" style="margin-left:0.5rem">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
